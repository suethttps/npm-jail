# GoReleaser - https://goreleaser.com
# Builds and publishes npm-jail releases.
# Runs in CI for every "v*" tag (see .github/workflows/release.yml) and can
# also be tested locally with:  goreleaser release --snapshot --clean
version: 2

project_name: npm-jail

before:
  hooks:
    - go mod tidy

builds:
  - id: npm-jail
    main: .
    binary: npm-jail
    env:
      - CGO_ENABLED=0
    # npm-jail depends on bubblewrap (bwrap), which only exists on Linux.
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: npm-jail
    # Name in the OS_ARCH format that mise's "github"/ubi backend recognizes
    # automatically. Example: npm-jail_Linux_x86_64.tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: suethttps
    name: npm-jail
  draft: false
  prerelease: auto
