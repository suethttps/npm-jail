name: release

# Publish a new release whenever a "v*" tag is pushed manually.
#   git tag v0.1.0 && git push origin v0.1.0
# Merges to master are handled by auto-release.yml because tags pushed from a
# workflow with GITHUB_TOKEN do not trigger another workflow.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for goreleaser to create the release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser needs history/tags for the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
