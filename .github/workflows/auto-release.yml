name: auto-release

# After a binary-affecting merge lands on master, create the next patch tag and
# publish the release from the same workflow. Tags pushed with GITHUB_TOKEN do
# not trigger other workflows, so this cannot rely on release.yml being
# triggered afterward.
on:
  push:
    branches: [master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".goreleaser.yaml"

permissions:
  contents: write

concurrency:
  group: auto-release-master
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Create next patch tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          if git tag --points-at "$GITHUB_SHA" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | sed -n '1p')"
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            version="${latest#v}"
            IFS=. read -r major minor patch <<< "$version"
            next="v${major}.${minor}.$((patch + 1))"
          fi

          git -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            tag -a "$next" -m "Release $next" "$GITHUB_SHA"

          git push origin "refs/tags/$next"
          echo "release_needed=true" >> "$GITHUB_OUTPUT"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        if: steps.tag.outputs.release_needed == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish AUR package
        if: steps.tag.outputs.release_needed == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          VERSION: ${{ steps.tag.outputs.tag }}
        run: bash .github/scripts/publish-aur.sh
